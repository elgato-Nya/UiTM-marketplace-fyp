name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        working-directory: ["server", "client"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.working-directory }}
        run: npm ci

      - name: Run linter
        working-directory: ${{ matrix.working-directory }}
        run: npm run lint --if-present

      - name: Run tests
        working-directory: ${{ matrix.working-directory }}
        run: npm test --if-present
        env:
          CI: true
          DISABLE_ESLINT_PLUGIN: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.working-directory == 'server'
        with:
          file: ./server/coverage/lcov.info
          flags: server
          name: server-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.working-directory == 'client'
        with:
          file: ./client/coverage/lcov.info
          flags: client
          name: client-coverage

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (server)
        working-directory: server
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit (client)
        working-directory: client
        run: npm audit --audit-level=moderate || true

      - name: Check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Build React App
        working-directory: client
        run: |
          npm ci
          npm run build
        env:
          CI: false
          REACT_APP_ENVIRONMENT: production
          REACT_APP_API_URL: https://nekodez.com/api
          REACT_APP_STRIPE_PUBLISHABLE_KEY: pk_live_51S8W3bJ7ZnGFQqSh0pvOVQM2j6x3wqLicBqaeJj4dTgeJNtUXjRtnUYF9dvlz52mj8y8xtcPOHwxHS2CLlXUfcOp00nTXu6BDF

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build
          retention-days: 1

      - name: Verify server setup
        working-directory: server
        run: |
          npm ci --only=production
          echo "Server dependencies installed successfully"

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan, build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: client/build

      - name: Upload Build to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "client/build"
          target: "/home/ubuntu/uitm-marketplace"
          strip_components: 0

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        env:
          SERVER_ENV_FILE: ${{ secrets.SERVER_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: SERVER_ENV_FILE
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/ubuntu/uitm-marketplace"

            echo "Starting deployment..."
            cd $APP_DIR

            echo "Pulling latest code from main branch..."
            git fetch origin main
            git reset --hard origin/main || echo "Git reset failed, continuing..."

            # ========== DISK CLEANUP ==========
            echo "Cleaning up to preserve disk space..."
            # Remove client node_modules (not needed - build is pre-compiled)
            rm -rf $APP_DIR/client/node_modules
            # Remove stale build artifacts
            rm -rf $APP_DIR/client/build.old
            # Flush old PM2 logs
            pm2 flush || true
            # Clean npm cache
            npm cache clean --force 2>/dev/null || true

            # ========== BACKEND DEPLOYMENT ==========
            echo "Deploying backend..."
            cd $APP_DIR/server

            # Optional: sync server .env from GitHub secret if provided
            if [ -n "$SERVER_ENV_FILE" ]; then
              echo "Updating server .env from GitHub secret..."
              if [ -f .env ]; then
                cp .env ".env.backup.$(date +%Y%m%d%H%M%S)"
              fi
              printf "%s" "$SERVER_ENV_FILE" > .env
              chmod 600 .env
              echo ".env updated from secret"
            else
              echo "SERVER_ENV_FILE secret not set, using existing .env on server"
            fi


            if ! command -v node &> /dev/null; then
              echo "Node.js not found! Please install Node.js first."
              exit 1
            fi

            echo "Installing server dependencies..."
            npm ci --only=production

            if [ ! -f .env ]; then
              echo "Warning: .env file not found in server directory"
            fi

            echo "Restarting backend service..."
            if ! command -v pm2 &> /dev/null; then
              echo "Installing PM2 globally..."
              sudo npm install -g pm2
            fi

            if pm2 describe uitm-marketplace-server > /dev/null 2>&1; then
              pm2 restart uitm-marketplace-server
              echo "Backend restarted"
            else
              pm2 start index.js --name uitm-marketplace-server --env production
              echo "Backend started"
            fi
            pm2 save

            echo "Waiting for backend to start..."
            sleep 5

            if pm2 describe uitm-marketplace-server | grep -q "online"; then
              echo "Backend is online"
            else
              echo "Warning: Backend may not be running properly"
              pm2 logs uitm-marketplace-server --lines 20 --nostream
            fi

            # ========== FRONTEND DEPLOYMENT ==========
            echo "Deploying pre-built frontend..."
            cd $APP_DIR/client

            if [ ! -d "build" ]; then
              echo "Build folder not found! SCP upload may have failed."
              exit 1
            fi

            if ! command -v serve &> /dev/null; then
              echo "Installing serve globally..."
              sudo npm install -g serve
            fi

            echo "Restarting frontend service..."
            if pm2 describe uitm-marketplace-client > /dev/null 2>&1; then
              pm2 delete uitm-marketplace-client
            fi
            pm2 start "serve -s build -l tcp://0.0.0.0:3000" --name uitm-marketplace-client
            pm2 save

            echo "Waiting for frontend to start..."
            sleep 5

            echo "Deployment completed successfully!"
            pm2 status

            echo ""
            echo "Recent backend logs:"
            pm2 logs uitm-marketplace-server --lines 10 --nostream

      - name: Health Check (EC2)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "Waiting for services to start..."
            sleep 20

            echo "Checking local backend on EC2 (http://localhost:5000/api/health)"
            LOCAL_OK=0
            for i in {1..10}; do
              LOCAL_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || echo "000")
              echo "Attempt $i: local backend HTTP $LOCAL_CODE"
              if [ "$LOCAL_CODE" = "200" ]; then
                LOCAL_OK=1
                break
              fi
              sleep 5
            done

            if [ "$LOCAL_OK" -ne 1 ]; then
              echo "Local backend is not healthy on EC2"
              pm2 status || true
              pm2 logs uitm-marketplace-server --lines 40 --nostream || true
              exit 1
            fi

            echo "Checking public endpoint (https://nekodez.com/api/health)"
            PUBLIC_OK=0
            for i in {1..10}; do
              PUBLIC_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" https://nekodez.com/api/health || echo "000")
              echo "Attempt $i: public endpoint HTTP $PUBLIC_CODE"
              if [ "$PUBLIC_CODE" = "200" ]; then
                PUBLIC_OK=1
                break
              fi
              sleep 5
            done

            if [ "$PUBLIC_OK" -ne 1 ]; then
              echo "Public health endpoint is not healthy"
              echo "Backend is running locally; check Nginx upstream/proxy config"
              exit 1
            fi

            echo "Deployment verification passed!"
      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Check the logs above for details."

